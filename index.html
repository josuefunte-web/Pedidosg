<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="O'Carro">
<link rel="manifest" id="pwa-manifest">
<title>O'Carro — Pedidos</title>
<!-- Firebase -->
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.js"></script>
<!-- Charts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --pri:#1a1a2e;--acc:#e94560;--grn:#25D366;--grnd:#1da851;
  --bg:#f0f2f5;--card:#fff;--brd:#e0e0e0;
  --txt:#222;--mut:#888;--r:12px;--sh:0 2px 14px rgba(0,0,0,.08);
}
body.dark{
  --pri:#e94560;--acc:#ff6b8a;
  --bg:#0f0f1a;--card:#1a1a2e;--brd:#2d2d4e;
  --txt:#e8e8f0;--mut:#8888aa;--sh:0 2px 14px rgba(0,0,0,.4);
}
body.dark .hdr{background:#0a0a14}
body.dark .tab.act{background:#2d2d4e;color:#e8e8f0}
body.dark .tabs{background:#0f0f1a}
body.dark input,body.dark select,body.dark textarea{background:#2d2d4e;color:#e8e8f0;border-color:#3d3d5e}
body.dark .stab{background:#2d2d4e;color:#e8e8f0}
body.dark .stab.act{background:var(--pri);color:#fff}
body.dark .pi{background:#1a1a2e;border-color:#2d2d4e}
body.dark .pi.ic{border-color:var(--pri)}
body.dark .sidebar{background:#0a0a14;border-color:#2d2d4e}
body.dark .oc{background:#1a1a2e;border-color:#2d2d4e}
body.dark .stat{background:#1a1a2e;border-color:#2d2d4e}
body.dark .btn-ghost{border-color:#2d2d4e;color:#e8e8f0}
body.dark .banner{background:#2d2d4e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.hdr{background:var(--pri);color:#fff;height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-size:17px;font-weight:800;letter-spacing:.3px;cursor:pointer}
.logo span{color:var(--acc)}
.hdr-r{display:flex;align-items:center;gap:6px}
.hbtn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn.act{background:var(--acc)}
.ses-info{font-size:12px;opacity:.7;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px;transition:.3s}
.fb-dot.on{background:#4ade80}
.main{max-width:860px;margin:0 auto;padding:18px 14px 90px}
.card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin-bottom:14px}
.tabs{display:flex;gap:3px;background:var(--bg);padding:4px;border-radius:10px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;padding:8px 10px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--mut);white-space:nowrap;min-width:fit-content;transition:.2s}
.tab.act{background:#fff;color:var(--pri);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:10px;padding:14px 10px;text-align:center;border:1.5px solid var(--brd)}
.sv{font-size:24px;font-weight:800;color:var(--pri)}
.sl{font-size:10px;color:var(--mut);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.btn{padding:9px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;text-decoration:none;transition:.2s;white-space:nowrap}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:#2d2d4e}
.btn-acc{background:var(--acc);color:#fff}.btn-acc:hover{opacity:.9}
.btn-ok{background:#dcfce7;color:#16a34a}.btn-ok:hover{background:#bbf7d0}
.btn-no{background:#fee2e2;color:#dc2626}.btn-no:hover{background:#fecaca}
.btn-wa{background:var(--grn);color:#fff}.btn-wa:hover{background:var(--grnd)}
.btn-ghost{background:transparent;border:1.5px solid var(--brd);color:var(--txt)}.btn-ghost:hover{background:var(--bg)}
.btn-blue{background:#dbeafe;color:#1d4ed8}.btn-blue:hover{background:#bfdbfe}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.oc{border:1.5px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px}
.oc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.oc-rest{font-size:15px;font-weight:700;color:var(--pri)}
.oc-sub{font-size:12px;color:var(--mut);margin-top:2px}
.oc-acts{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-p{background:#fef3c7;color:#d97706}.b-a{background:#dcfce7;color:#16a34a}.b-r{background:#fee2e2;color:#dc2626}.b-f{background:#dbeafe;color:#1d4ed8}.b-recv{background:#f3e8ff;color:#7c3aed}.b-urg{background:#dc2626;color:#fff;animation:urgpulse 1.2s ease-in-out infinite}
@keyframes urgpulse{0%,100%{opacity:1}50%{opacity:.7}}
.pl{font-size:13px;border-top:1px solid var(--brd);padding-top:8px}
.pr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #f0f0f0}
.pr:last-child{border:none}
.pn{flex:1;color:var(--txt)}.pq{font-weight:700;color:var(--pri);margin-left:10px}.pp{color:var(--mut);margin-left:8px;min-width:72px;text-align:right}
.ptot{display:flex;justify-content:flex-end;margin-top:8px;padding-top:7px;border-top:1.5px solid var(--brd);font-weight:800;font-size:15px;color:var(--pri)}
.fg{margin-bottom:13px}
label{display:block;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
select,input[type=text],input[type=tel],input[type=number],input[type=password],input[type=date]{width:100%;padding:9px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:14px;background:#fff;color:var(--txt);outline:none;transition:border-color .2s}
select:focus,input:focus{border-color:var(--pri)}
.sup-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.stab{padding:7px 13px;border-radius:20px;border:1.5px solid var(--brd);background:#fff;font-size:13px;cursor:pointer;font-weight:600;transition:.2s}
.stab.act{background:var(--pri);color:#fff;border-color:var(--pri)}
.pgrid{display:grid;gap:7px}
.pi{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1.5px solid var(--brd);border-radius:8px;background:#fff;gap:10px;transition:border-color .2s}
.pi.ic{border-color:var(--pri);background:#f5f5ff}
.pi-i{flex:1;min-width:0}.pi-n{font-size:14px;font-weight:500}.pi-p{font-size:12px;color:var(--mut);margin-top:2px}
.qc{display:flex;align-items:center;gap:8px}
.qb{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brd);background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--pri);transition:.2s;line-height:1}
.qb:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.qd{min-width:28px;text-align:center;font-weight:800;font-size:15px}
.cbar{position:fixed;bottom:0;left:0;right:0;background:var(--pri);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;transform:translateY(100%);transition:transform .3s;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
.cbar.up{transform:translateY(0)}
.cb-v{font-weight:700;font-size:16px}.cb-s{opacity:.7;font-size:12px;margin-top:1px}
.cc{border:1.5px solid #d1fae5;background:#f0fdf4;border-radius:10px;padding:14px;margin-bottom:10px}
.cc-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.cc-name{font-size:15px;font-weight:800;color:#166534}
.ch-wrap{position:relative;height:260px}
.sh{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px}
.empty{text-align:center;padding:48px 20px;color:var(--mut)}
.ei{font-size:44px;margin-bottom:10px}.et{font-size:14px}
.toast{position:fixed;top:62px;right:14px;background:#222;color:#fff;padding:10px 15px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:tin .3s ease;max-width:300px}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.pin-box{background:#fff;border-radius:18px;padding:28px 24px;width:100%;max-width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.pin-title{font-size:17px;font-weight:800;color:var(--pri);margin-bottom:4px}
.pin-sub{font-size:13px;color:var(--mut);margin-bottom:20px}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--brd);transition:.2s}
.dot.fill{background:var(--pri);border-color:var(--pri)}
.pin-err{color:#dc2626;font-size:13px;margin-bottom:12px;font-weight:600;display:none}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.nk{background:var(--bg);border:none;border-radius:12px;height:52px;font-size:20px;font-weight:700;cursor:pointer;color:var(--pri);transition:.15s}
.nk:hover,.nk:active{background:#dde0e8;transform:scale(.95)}
.nk.ok{background:var(--pri);color:#fff}.nk.ok:hover{background:#2d2d4e}
.login-wrap{max-width:860px;margin:0 auto;padding:24px 14px}
.login-title{text-align:center;font-size:22px;font-weight:800;color:var(--pri);margin-bottom:4px}
.login-sub{text-align:center;font-size:14px;color:var(--mut);margin-bottom:24px}
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.rest-card{background:#fff;border-radius:var(--r);padding:18px 14px;cursor:pointer;border:2px solid var(--brd);transition:.2s;text-align:center;box-shadow:var(--sh)}
.rest-card:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.rest-emoji{font-size:28px;margin-bottom:8px}
.rest-name{font-size:13px;font-weight:700;color:var(--pri);line-height:1.3}
.admin-row{display:flex;justify-content:center;margin-top:10px}
.admin-btn{background:transparent;border:2px solid var(--pri);color:var(--pri);padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;transition:.2s}
.admin-btn:hover{background:var(--pri);color:#fff}
.user-card,.sup-card{border:1.5px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px;background:#fff}
.uc-hd,.sc-hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.uc-name,.sc-name{font-size:15px;font-weight:700;color:var(--pri)}
.uc-info,.sc-info{font-size:12px;color:var(--mut);margin-top:2px}
.uc-acts,.sc-acts{display:flex;gap:6px}
.uc-body,.sc-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three-col{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--brd);border-radius:7px;margin-bottom:6px;background:var(--bg)}
.prod-info{flex:1}.prod-name-t{font-size:13px;font-weight:600}.prod-meta{font-size:11px;color:var(--mut)}
.banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:13px;color:#92400e;display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.banner.blue{background:#eff6ff;border-color:#93c5fd;color:#1e40af}
.banner.red{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.banner.green{background:#f0fdf4;border-color:#86efac;color:#166534}
.wa-ic{width:14px;height:14px;fill:currentColor;flex-shrink:0;margin-top:1px}
.wa-modal{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.wa-modal h3{font-size:17px;font-weight:800;color:var(--pri);margin-bottom:8px}
.wa-modal p{font-size:13px;color:var(--mut);margin-bottom:16px;line-height:1.5}
.wa-msg{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;font-family:monospace;white-space:pre-wrap;margin-bottom:16px;max-height:200px;overflow-y:auto;color:var(--txt)}
.wa-modal-btns{display:flex;gap:8px;flex-wrap:wrap}
.alb-card{border:1.5px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px;background:#fff}
.alb-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.alb-rest{font-size:15px;font-weight:700;color:var(--pri)}
.alb-info{font-size:12px;color:var(--mut);margin-top:2px}
.alb-photo{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-bottom:10px;border:1px solid var(--brd)}
.cmp-cell{padding:8px;border-radius:7px;font-size:12px;margin-bottom:6px}
.cmp-ok{background:#f0fdf4;border:1px solid #86efac}
.cmp-warn{background:#fef3c7;border:1px solid #fcd34d}
.cmp-err{background:#fef2f2;border:1px solid #fca5a5}
.cmp-name{font-weight:600;color:var(--pri)}.cmp-val{color:var(--mut);margin-top:2px}
.img-preview{width:100%;border-radius:10px;margin-bottom:12px;display:none;border:1px solid var(--brd)}
.ocr-progress{font-size:13px;color:var(--mut);text-align:center;padding:10px;display:none}
.item-entry{border:1.5px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--bg);position:relative}
.item-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--mut)}
.item-del:hover{color:#dc2626}
.spend-table{width:100%;border-collapse:collapse;font-size:13px}
.spend-table th{background:var(--pri);color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.spend-table td{padding:8px 10px;border-bottom:1px solid var(--brd)}
.spend-table tr:hover td{background:var(--bg)}
.diff-ok{color:#16a34a;font-weight:700}.diff-warn{color:#d97706;font-weight:700}.diff-err{color:#dc2626;font-weight:700}
.file-input-wrap{position:relative}
.file-input-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.file-input-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border:2px dashed var(--brd);border-radius:10px;color:var(--mut);font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.file-input-btn:hover{border-color:var(--pri);color:var(--pri);background:#f9f9ff}
/* Live indicator */
.live-badge{display:inline-flex;align-items:center;gap:5px;background:#dcfce7;color:#16a34a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pulse{width:7px;height:7px;border-radius:50%;background:#16a34a;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:480px){
  .two-col,.three-col{grid-template-columns:1fr}
  .ses-info{display:none}
}
/* ── SIDEBAR ADMIN LAYOUT ── */
.adm-layout{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:var(--pri);color:#fff;overflow-y:auto;display:flex;flex-direction:column;z-index:88}
.sb-mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:6px}
.sb-ms{padding:10px 12px;text-align:center}
.sb-msv{font-size:18px;font-weight:800;line-height:1}
.sb-msl{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.3px;margin-top:3px}
.sg-hd{padding:10px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;opacity:.55;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:.15s}
.sg-hd:hover,.sg-hd.has-act{opacity:.9;background:rgba(255,255,255,.05)}
.sg-arrow{font-size:9px;transition:.2s}
.sg-direct{padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;opacity:.75;transition:.15s;display:flex;align-items:center;gap:8px}
.sg-direct:hover{opacity:1;background:rgba(255,255,255,.08)}
.sg-direct.act{opacity:1;background:rgba(255,255,255,.15);border-left:3px solid var(--acc);padding-left:11px}
.sg-item{padding:9px 14px 9px 32px;font-size:13px;cursor:pointer;opacity:.7;transition:.15s;display:flex;align-items:center;justify-content:space-between}
.sg-item:hover{opacity:1;background:rgba(255,255,255,.07)}
.sg-item.act{opacity:1;background:rgba(255,255,255,.15);font-weight:700;border-left:3px solid var(--acc);padding-left:29px}
.sb-badge{background:var(--acc);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:800}
.adm-content{flex:1;overflow-y:auto;padding:16px;min-width:0;background:var(--bg)}
.sb-overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.45);z-index:87}
.hbtn-menu{display:none;background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;align-items:center;justify-content:center}
@media(max-width:700px){
  .hbtn-menu{display:flex}
  .adm-layout{height:auto;min-height:calc(100vh - 56px)}
  .sidebar{position:fixed;left:0;top:56px;bottom:0;width:240px;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sidebar.sb-open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.35)}
  .sb-overlay.sb-open{display:block}
  .adm-content{padding:12px 10px}
}
/* ── ESCANDALLOS ── */
.esc-filtros{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.esc-filtros input,.esc-filtros select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--brd);background:#fff;color:var(--txt);font-size:14px}
.esc-filtros input{flex:1;min-width:180px}
.esc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.esc-card{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);padding:16px;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative}
.esc-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.12);transform:translateY(-2px)}
.esc-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--mut);margin-bottom:8px}
.esc-card h4{margin:0 0 10px;font-size:16px;color:var(--pri)}
.esc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px}
.esc-stat{display:flex;flex-direction:column}
.esc-stat span:first-child{color:var(--mut);font-size:11px}
.esc-stat strong{font-size:14px}
.esc-fc-ind{position:absolute;top:14px;right:14px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:3px solid}

/* ═══════════════ FIREBASE LISTENERS ═══════════════ */
function initFirebaseListeners(){
  if(!fbDb) return;

  // Connection status
  fbDb.ref('.info/connected').on('value', snap => {
    fbConnected = snap.val() === true;
    const dot = document.getElementById('fb-dot');
    if(dot) dot.className = 'fb-dot' + (fbConnected ? ' on' : '');
  });

  // Orders — real-time sync
  let _lastOrderIds=null;
  fbDb.ref('orders').on('value', snap => {
    const val = snap.val();
    const newOrders = val ? Object.values(val).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)) : [];
    // Push notifications for new orders (admin) and status changes (restaurant)
    try{
      if(_lastOrderIds!==null){
        const oldIds=_lastOrderIds;
        newOrders.forEach(o=>{
          if(!oldIds.has(o.id)){
            if(S.session?.isAdmin) pushNotify(`Nuevo pedido — ${o.restaurant}`,`${(suppliers[o.supId]||{name:o.supId}).name} · ${fmt(total(o))}${o.urgent?' 🚨 URGENTE':''}`,o.urgent?'🚨':'🛒');
          } else {
            const old=orders.find(x=>x.id===o.id);
            if(old&&old.status!==o.status&&S.session&&!S.session.isAdmin&&o.restaurant===S.session.restaurant){
              if(o.status==='approved') pushNotify('Pedido aprobado ✅',`Tu pedido a ${(suppliers[o.supId]||{name:o.supId}).name} ha sido aprobado`,'✅');
              else if(o.status==='rejected') pushNotify('Pedido rechazado ✗',o.rejectReason||'Contacta con el administrador','❌');
            }
          }
        });
      }
    }catch(e){ console.warn('Push notify error:',e); }
    _lastOrderIds=new Set(newOrders.map(o=>o.id));
    orders = newOrders;
    if(S.view==='admin') renderAdminContent();
    if(S.view==='order' && S.orderTab==='history') render();
  });

  // Suppliers — real-time sync
  fbDb.ref('suppliers').on('value', snap => {
    const val = snap.val();
    if(val){
      suppliers = val;
      localStorage.setItem('oc_suppliers', JSON.stringify(suppliers));
    }
    if(S.view==='order'||S.view==='albaran-new') render();
  });

  // Albaranes — real-time sync
  fbDb.ref('albaranes').on('value', snap => {
    const val = snap.val();
    albNotes = val ? Object.values(val).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)) : [];
    if(S.view==='admin' && S.adminTab==='albaranes') renderAdminContent();
  });

  // Push default suppliers if DB is empty
  fbDb.ref('suppliers').once('value', snap => {
    if(!snap.val()){
      fbDb.ref('suppliers').set(DEFAULT_SUPS);
    }
  });

  // Revenue — food cost
  fbDb.ref('revenue').on('value', snap => {
    revenue = snap.val() || {};
    if(S.view==='admin' && S.adminTab==='foodcost') renderAdminContent();
  });
  // Budgets
  fbDb.ref('budgets').on('value', snap => {
    budgets = snap.val() || {};
    if(S.view==='admin' && S.adminTab==='budgets') renderAdminContent();
  });
  // Price history
  fbDb.ref('priceHistory').on('value', snap => {
    const val = snap.val();
    priceHistory = val ? Object.values(val).sort((a,b)=>new Date(b.changedAt)-new Date(a.changedAt)) : [];
  });
  // Templates
  fbDb.ref('templates').on('value', snap => {
    templates = snap.val() || {};
    if(S.view==='order') render();
  });
}

function openPIN(type,userId){
  S.pinTarget={type,userId};S.pinBuf='';
  const u=type==='user'?cfg.users.find(u=>u.id===userId):null;
  document.getElementById('pin-title').textContent=type==='admin'?'Administrador':(u?u.restaurant:'PIN');
  document.getElementById('pin-sub').textContent=type==='admin'?'PIN de administrador':'Introduce tu PIN';
  document.getElementById('pin-err').style.display='none';
  updateDots();
  document.getElementById('pin-ov').style.display='flex';
}
function closePIN(){ document.getElementById('pin-ov').style.display='none';S.pinBuf=''; }
function addPIN(d){ if(S.pinBuf.length>=4)return;S.pinBuf+=d;updateDots();if(S.pinBuf.length===4)setTimeout(confirmPIN,120); }
function delPIN(){ S.pinBuf=S.pinBuf.slice(0,-1);updateDots(); }
function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('d'+i).className='dot'+(i<S.pinBuf.length?' fill':'');
  document.getElementById('pin-err').style.display='none';
}
function confirmPIN(){
  const {type,userId}=S.pinTarget;
  if(type==='admin'){
    if(S.pinBuf===cfg.adminPIN){closePIN();S.session={isAdmin:true,name:cfg.adminName};goAdmin();}
    else wrong();
  } else {
    const u=cfg.users.find(u=>u.id===userId);
    if(u&&S.pinBuf===u.pin){closePIN();S.session={userId:u.id,name:u.name,restaurant:u.restaurant,isAdmin:false,needsApproval:u.needsApproval};goOrder();}
    else wrong();
  }
}
function wrong(){ S.pinBuf='';updateDots();const e=document.getElementById('pin-err');e.style.display='block';setTimeout(()=>e.style.display='none',2000); }
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-ov').style.display==='none') return;
  if(e.key>='0'&&e.key<='9') addPIN(e.key);
  else if(e.key==='Backspace') delPIN();
  else if(e.key==='Enter') confirmPIN();
});

function vOrder(){
  const myPending=orders.filter(o=>o.restaurant===S.session.restaurant&&o.status==='pending').length;
  const myApproved=orders.filter(o=>o.restaurant===S.session.restaurant&&o.status==='approved').length;
  const histBadge=myPending?` <span style="background:var(--acc);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px">${myPending}</span>`:'';
  const tabsHtml=`<div class="tabs" style="margin-bottom:16px">

    <button class="tab ${S.orderTab==='history'?'act':''}" onclick="S.orderTab='history';render()">📋 Mis pedidos${histBadge}</button>
  </div>`;

  if(S.orderTab==='history'){
    return `<div class="main">${tabsHtml}${vMyOrders()}</div>`;
  }

  const sups=visibleSups();
  if(!sups.length) return `<div class="main">${tabsHtml}<div class="empty"><div class="ei">🏭</div><div class="et">No hay proveedores activos para este local.</div></div></div>`;
  if(!suppliers[S.supId]||!(sups.find(s=>s.id===S.supId))) S.supId=sups[0].id;
  const sup=suppliers[S.supId];
  const cnt=Object.values(S.cart).reduce((s,v)=>s+v,0);
  const tot=sup.products.reduce((s,p)=>s+(S.cart[p.id]||0)*p.price,0);
  const note=S.session.needsApproval
    ?`<div class="banner">📋 Tu pedido irá a <strong>${cfg.adminName}</strong> para aprobación antes de enviarse al proveedor.</div>`
    :`<div class="banner blue">⚡ Tus pedidos se aprueban automáticamente y van directo al proveedor.</div>`;
  const stabs=sups.map(s=>`<button class="stab ${S.supId===s.id?'act':''}" onclick="setSup('${s.id}')">${s.emoji} ${s.name}</button>`).join('');
  const searchTerm=(S.prodSearch||'').toLowerCase().trim();
  const filteredProds=sup.products.filter(p=>!searchTerm||p.name.toLowerCase().includes(searchTerm));
  const prods=filteredProds.map(p=>{
    const q=S.cart[p.id]||0;
    return `<div class="pi ${q>0?'ic':''}" id="pi-${p.id}">
      <div class="pi-i"><div class="pi-n">${p.name}</div><div class="pi-p">${fmt(p.price)} / ${p.unit}</div></div>

        <button class="qb" onclick="chgQ('${p.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
  const myTpls=Object.values(templates[S.session.userId]||{}).filter(t=>t.supId===S.supId);
  // Auto-suggest: most ordered products for this restaurant+supplier
  const myHistory=orders.filter(o=>o.restaurant===S.session.restaurant&&o.supId===S.supId&&o.status!=='rejected');
  const autoSuggest={};
  myHistory.forEach(o=>o.items.forEach(it=>{if(!autoSuggest[it.id])autoSuggest[it.id]={...it,count:0,totalQty:0};autoSuggest[it.id].count++;autoSuggest[it.id].totalQty+=it.qty;}));
  const topProds=Object.values(autoSuggest).sort((a,b)=>b.count-a.count).slice(0,5);
  const autoBtn=topProds.length&&!Object.keys(S.cart).length?`<button class="btn btn-blue btn-sm" onclick="loadAutoSuggest()" style="white-space:nowrap">🤖 Pedido típico</button>`:'';
  const tplSection=`<div class="sh" style="margin-top:4px">Plantillas</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${autoBtn}
      ${myTpls.map(t=>`<div style="display:flex;gap:2px"><button class="btn btn-ghost btn-sm" onclick="loadTemplate('${t.id}')" style="border-radius:6px 0 0 6px">📥 ${t.name}</button><button class="btn btn-no btn-sm" onclick="deleteTpl('${t.id}')" style="border-radius:0 6px 6px 0;padding:0 8px">✕</button></div>`).join('')}

  return mine.map(o=>{

    const sMap={
      pending: {cls:'b-p', lbl:'⏳ Pendiente de aprobación'},
      approved:{cls:'b-a', lbl:'✅ Aprobado'},
      rejected:{cls:'b-r', lbl:'✗ Rechazado'},
      received:{cls:'b-recv',lbl:'📦 Recibido'}

    const s=sMap[o.status]||{cls:'b-p',lbl:o.status};

function orderCard(o,showActions){
  const sup=suppliers[o.supId]||{name:'?',emoji:'?',phone:''};
  const isEditing=S.editOrderId===o.id;
  const editItems=isEditing?S.editItems:o.items;
  const tot=editItems.reduce((s,it)=>s+it.qty*it.price,0);
  const bc={pending:'b-p',approved:'b-a',rejected:'b-r',received:'b-recv'}[o.status]||'b-p';
  const bl={pending:'Pendiente',approved:'Aprobado',rejected:'Rechazado',received:'✔ Recibido'}[o.status]||o.status;
  const modTag=o.modifiedByAdmin?` <span class="badge b-f">✏️ Modificado</span>`:'';
  const urgTag=o.urgent?` <span class="badge b-urg">🚨 URGENTE</span>`:'';
  const delTag=o.deliveryDate?` <span style="font-size:11px;color:var(--mut);font-weight:600">📅 Entrega: ${o.deliveryDate}</span>`:'';
  const recvBtn=showActions&&o.status==='approved'?`<button class="btn btn-ghost btn-sm" onclick="markReceived('${o.id}')">📦 Marcar recibido</button>`:'';
  const restRecvBtn=!showActions&&o.status==='approved'&&S.session?`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="markReceived('${o.id}')">📦 Confirmar recepción</button>`:'';

  let itemsHtml='';
  if(isEditing){
    itemsHtml=S.editItems.map((it,i)=>`
      <div class="pr" style="align-items:center;flex-wrap:nowrap">
        <span class="pn" style="flex:1">${it.name}</span>
        <div class="qc" style="margin-left:8px">
          <button class="qb" onclick="editItemQty(${i},-1)">−</button>
          <span class="qd" id="eiq-${i}" style="min-width:32px;text-align:center">${it.qty}</span>
          <button class="qb" onclick="editItemQty(${i},1)">+</button>
        </div>
        <span class="pp" id="eip-${i}" style="margin-left:8px">${fmt(it.qty*it.price)}</span>
      </div>`).join('');
  } else {
    itemsHtml=(o.items||[]).map(it=>`<div class="pr"><span class="pn">${it.name||'?'}</span><span class="pq">${it.qty} ${it.unit||''}</span><span class="pp">${fmt((it.qty||0)*(it.price||0))}</span></div>`).join('');
  }
  let acts='';
  if(showActions&&o.status==='pending'){
    if(isEditing){
      acts=`<div class="oc-acts" style="flex-wrap:wrap">
        <button class="btn btn-ok btn-sm" onclick="approveWithEdits('${o.id}')">✅ Aprobar</button>
        <button class="btn btn-ghost btn-sm" onclick="S.editOrderId=null;S.editItems=[];renderAdminContent()">✕ Cancelar</button>
      </div>`;
    } else {
      acts=`<div class="oc-acts">
        <button class="btn btn-ok btn-sm" onclick="approve('${o.id}')">✅ Aprobar</button>
        <button class="btn btn-blue btn-sm" onclick="startEditOrder('${o.id}')">✏️ Modificar</button>
        <button class="btn btn-no btn-sm" onclick="rejectWithReason('${o.id}')">✗ Rechazar</button>
      </div>`;
    }
  } else if(o.status==='approved'){
    acts=`<div class="oc-acts">
      <button class="btn btn-wa btn-sm" onclick="showWA('${sup.phone||''}',msgSupplier(orders.find(x=>x.id==='${o.id}')),'Envía el pedido aprobado al proveedor')">${WA_SVG} ${sup.name}</button>
    </div>`;
  }
  const totLabel=isEditing?`<div class="ptot" id="edit-tot">Total: ${fmt(tot)}</div>`:`<div class="ptot">Total: ${fmt(tot)}</div>`;
  const threshold=cfg.alertThreshold||300;
  const isLargeOrder=showActions&&tot>=threshold;
  const largeAlert=isLargeOrder?`<div class="banner red" style="margin:6px 0 2px">⚠️ Pedido grande — supera ${fmt(threshold)}</div>`:'';
  // Budget warning
  const oUser=cfg.users.find(u=>u.restaurant===o.restaurant);
  const bKey=oUser?oUser.id+'_'+o.createdAt.slice(0,7):null;
  const bLimit=bKey?(budgets[bKey]||0):0;
  const bSpent=bKey?orders.filter(x=>x.status==='approved'&&x.restaurant===o.restaurant&&x.createdAt.startsWith(o.createdAt.slice(0,7))).reduce((s,x)=>s+total(x),0):0;
  const budgetAlert=bLimit>0&&bSpent>bLimit?`<div class="banner red" style="margin:4px 0 2px">💳 Presupuesto superado — ${fmt(bSpent)} de ${fmt(bLimit)}</div>`:'';

    <div class="pl">${itemsHtml}${totLabel}</div>
    ${recvBtn||restRecvBtn}
  </div>`;
}

function vPending(){ const p=orders.filter(o=>o.status==='pending');return p.length?p.map(o=>orderCard(o,true)).join(''):`<div class="empty"><div class="ei">🎉</div><div class="et">Sin pedidos pendientes</div></div>`; }
function vApproved(){ const a=orders.filter(o=>o.status==='approved');return a.length?a.map(o=>orderCard(o,false)).join(''):`<div class="empty"><div class="ei">📋</div><div class="et">Sin pedidos aprobados</div></div>`; }

function vConsolidated(){
  const pend=orders.filter(o=>o.status==='pending');
  if(!pend.length) return `<div class="empty"><div class="ei">📦</div><div class="et">No hay pedidos pendientes</div></div>`;
  const bySup={};
  pend.forEach(o=>{ if(!bySup[o.supId])bySup[o.supId]={}; o.items.forEach(it=>{ if(!bySup[o.supId][it.id])bySup[o.supId][it.id]={...it,qty:0,rests:[]}; bySup[o.supId][it.id].qty+=it.qty; bySup[o.supId][it.id].rests.push(o.restaurant.replace("O'Carro ",'')); }); });
  return Object.entries(bySup).map(([sid,items])=>{
    const sup=suppliers[sid]||{name:sid,emoji:'📦',phone:''};
    const arr=Object.values(items);
    const tot=arr.reduce((s,it)=>s+it.qty*it.price,0);
    const co={supId:sid,restaurant:`Consolidado`,items:arr,createdAt:new Date().toISOString()};
    const rows=arr.map(it=>`<div class="pr"><span class="pn">${it.name} <small style="color:var(--mut)">(${[...new Set(it.rests)].length}r)</small></span><span class="pq">${it.qty} ${it.unit}</span><span class="pp">${fmt(it.qty*it.price)}</span></div>`).join('');
    return `<div class="cc"><div class="cc-hd"><div class="cc-name">${sup.emoji} ${sup.name}</div>
      <button class="btn btn-wa btn-sm" onclick="showWA('${sup.phone||''}',msgSupplier(${JSON.stringify(co).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}), 'Pedido consolidado')">${WA_SVG} Enviar</button>
    </div><div class="pl">${rows}<div class="ptot">Total: ${fmt(tot)}</div></div></div>`;
  }).join('');
}

function renderChart(){
  const ctx=document.getElementById('chart');if(!ctx)return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const byR={};
  orders.filter(o=>o.status==='approved').forEach(o=>{ const k=o.restaurant.replace("O'Carro ",'');byR[k]=(byR[k]||0)+total(o); });
  const ent=Object.entries(byR).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
  if(!ent.length){ ctx.parentNode.innerHTML=`<div class="empty" style="height:260px;display:flex;flex-direction:column;justify-content:center"><div class="ei">📊</div><div class="et">Aprueba pedidos para ver el gasto</div></div>`;return; }
  chartInst=new Chart(ctx,{type:'bar',data:{labels:ent.map(([k])=>k),datasets:[{data:ent.map(([,v])=>v),backgroundColor:'#1a1a2e',borderRadius:6,hoverBackgroundColor:'#e94560'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{y:{ticks:{callback:v=>v.toLocaleString('es-ES',{maximumFractionDigits:0})+' €'},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}}});
}

function vAlbaranes(){
  const btn=`<button class="btn btn-pri btn-sm" onclick="goAlbaranAdmin()" style="margin-bottom:14px">+ Nuevo albarán</button>`;
  const byRest={};
  orders.filter(o=>o.status==='approved').forEach(o=>{ if(!byRest[o.restaurant])byRest[o.restaurant]={ordered:0,received:0}; byRest[o.restaurant].ordered+=total(o); });
  albNotes.forEach(a=>{ if(!byRest[a.restaurant])byRest[a.restaurant]={ordered:0,received:0}; byRest[a.restaurant].received+=a.items.reduce((s,it)=>s+it.qty*it.price,0); });
  const tableRows=Object.entries(byRest).map(([rest,d])=>{
    const diff=d.received-d.ordered;
    const pct=d.ordered>0?((diff/d.ordered)*100).toFixed(1):'-';
    const cls=Math.abs(diff)<1?'diff-ok':diff>0?'diff-err':'diff-warn';
    return `<tr><td>${rest.replace("O'Carro ",'')}</td><td>${fmt(d.ordered)}</td><td>${fmt(d.received)}</td><td class="${cls}">${diff>=0?'+':''}${fmt(diff)}${pct!=='-'?' ('+pct+'%)':''}</td></tr>`;
  }).join('');
  const table=tableRows?`<div class="card"><div class="card-t">📊 Pedido vs Recibido por local</div><div style="overflow-x:auto"><table class="spend-table"><tr><th>Local</th><th>Pedido</th><th>Recibido</th><th>Diferencia</th></tr>${tableRows}</table></div></div>`:'';
  const notes=albNotes.length?albNotes.map(a=>albCard(a)).join(''):`<div class="empty"><div class="ei">📋</div><div class="et">Sin albaranes registrados</div></div>`;
  return btn+table+`<div class="sh">Albaranes</div>`+notes;
}

function goAlbaranAdmin(){ S.view='albaran-new';S.albItems=[];S.albRestaurant='';S.albSupId=supList()[0]?.id||'';S.albPhoto=null;S.albDate=new Date().toISOString().split('T')[0];render(); }

function albCard(a){
  const sup=suppliers[a.supId]||{name:'?',emoji:'?'};
  const tot=a.items.reduce((s,it)=>s+it.qty*it.price,0);
  const matchOrder=orders.find(o=>o.restaurant===a.restaurant&&o.supId===a.supId&&o.status==='approved');
  const hasIncidents=a.items.some(it=>it.incident);
  const rows=a.items.map(it=>`<div class="pr" style="${it.incident?'background:#fff5f5;border-radius:6px;padding:4px 6px;margin-bottom:2px':''}"><span class="pn">${it.code?`<small style="color:var(--mut)">[${it.code}]</small> `:''} ${it.name}${it.incident?`<div style="font-size:11px;color:#dc2626;margin-top:2px">⚠️ ${it.incident}</div>`:''}</span><span class="pq">${it.qty} ${it.unit}</span><span class="pp">${fmt(it.qty*it.price)}</span></div>`).join('');
  let cmp='';
  if(matchOrder){
    const cmpRows=a.items.map(ai=>{
      const oi=matchOrder.items.find(x=>x.name.toLowerCase()===ai.name.toLowerCase());
      if(!oi) return `<div class="cmp-cell cmp-warn"><div class="cmp-name">${ai.name}</div><div class="cmp-val">⚠️ No estaba en el pedido</div></div>`;
      const qDiff=ai.qty-oi.qty;
      const cls=qDiff===0?'cmp-ok':Math.abs(qDiff/oi.qty)<0.05?'cmp-warn':'cmp-err';
      return `<div class="cmp-cell ${cls}"><div class="cmp-name">${ai.name}</div><div class="cmp-val">Pedido: ${oi.qty} · Recibido: ${ai.qty}${qDiff!==0?` (${qDiff>0?'+':''}${qDiff})`:' ✓'}</div></div>`;
    }).join('');
    cmp=`<div class="sh" style="margin-top:12px">Comparativa con pedido</div>${cmpRows}`;
  }
  return `<div class="alb-card">
    <div class="alb-hd">
      <div><div class="alb-rest">${a.restaurant}</div><div class="alb-info">${sup.emoji} ${sup.name} · ${new Date(a.date+'T00:00:00').toLocaleDateString('es-ES')}</div></div>

function showCropUI(){
  S.albCropping=true;
  render();
  setTimeout(initCropCanvas,80);
}
function cancelCrop(){ S.albCropping=false; render(); }
function initCropCanvas(){
  const canvas=document.getElementById('crop-canvas');
  if(!canvas)return;
  const img=new Image();
  img.src=S.albPhoto;
  img.onload=()=>{
    const maxW=canvas.parentElement.clientWidth-4;
    const scale=Math.min(1,maxW/img.naturalWidth);
    canvas.width=img.naturalWidth*scale;
    canvas.height=img.naturalHeight*scale;
    canvas._scale=scale; canvas._img=img;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    cropState={dragging:false,startX:0,startY:0,endX:0,endY:0};
    const pos=(e)=>{
      const r=canvas.getBoundingClientRect();
      const t=e.touches?e.touches[0]:e;
      return{x:Math.max(0,Math.min(canvas.width,t.clientX-r.left)),y:Math.max(0,Math.min(canvas.height,t.clientY-r.top))};
    };
    canvas.onmousedown=canvas.ontouchstart=(e)=>{e.preventDefault();const p=pos(e);cropState={dragging:true,startX:p.x,startY:p.y,endX:p.x,endY:p.y};};
    canvas.onmousemove=canvas.ontouchmove=(e)=>{if(!cropState.dragging)return;e.preventDefault();const p=pos(e);cropState.endX=p.x;cropState.endY=p.y;drawOverlay(ctx,img,canvas.width,canvas.height);};
    canvas.onmouseup=canvas.ontouchend=()=>{cropState.dragging=false;};
  };
}
function drawOverlay(ctx,img,w,h){
  ctx.drawImage(img,0,0,w,h);
  const x1=Math.min(cropState.startX,cropState.endX),y1=Math.min(cropState.startY,cropState.endY);
  const x2=Math.max(cropState.startX,cropState.endX),y2=Math.max(cropState.startY,cropState.endY);
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,w,h);
  if(x2>x1&&y2>y1){
    ctx.clearRect(x1,y1,x2-x1,y2-y1);
    ctx.drawImage(img,x1,y1,x2-x1,y2-y1,x1,y1,x2-x1,y2-y1);
    ctx.strokeStyle='#e94560';ctx.lineWidth=2;
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
  }
}
function applyCrop(){
  const canvas=document.getElementById('crop-canvas');
  if(!canvas){toast('Error al recortar','#dc2626');return;}
  const sc=canvas._scale||1;
  const x1=Math.min(cropState.startX,cropState.endX),y1=Math.min(cropState.startY,cropState.endY);
  const w=Math.abs(cropState.endX-cropState.startX),h=Math.abs(cropState.endY-cropState.startY);
  if(w<20||h<20){toast('Selecciona un área más grande arrastrando','#dc2626');return;}
  const out=document.createElement('canvas');
  out.width=Math.round(w/sc); out.height=Math.round(h/sc);
  out.getContext('2d').drawImage(canvas._img,x1/sc,y1/sc,w/sc,h/sc,0,0,out.width,out.height);
  S.albPhoto=out.toDataURL('image/jpeg',0.95);
  S.albCropping=false;
  render();
  toast('✂️ Recorte aplicado — ahora pulsa Reconocer','#16a34a');
}

async function runOCR(){
  if(!S.albPhoto){toast('Añade una foto primero','#dc2626');return;}
  const prog=document.getElementById('ocr-progress');
  if(prog){prog.style.display='block';prog.textContent=cfg.geminiKey?'🤖 Analizando con IA...':'🔍 Reconociendo texto...';}
  try{
    if(cfg.geminiKey){
      // Gemini Vision
      const base64=S.albPhoto.split(',')[1];
      const mime=S.albPhoto.split(';')[0].split(':')[1]||'image/jpeg';
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${cfg.geminiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[
          {inline_data:{mime_type:mime,data:base64}},
          {text:`Eres un asistente que lee albaranes de restaurante. Extrae TODOS los productos con sus cantidades y precios unitarios. Responde ÚNICAMENTE con un JSON array, sin ningún texto adicional antes ni después:\n[{"name":"Entrecot de ternera","qty":5.5,"unit":"KG","price":28.50}]\nUnidades posibles: KG, UN, L, Caja. Si no hay precio usa 0. Solo el JSON array.`}
        ]}]})
      });
      const data=await resp.json();
      if(data.error){toast('Error Gemini: '+data.error.message,'#dc2626');return;}
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      const match=text.match(/\[[\s\S]*\]/);
      if(match){
        const parsed=JSON.parse(match[0]);
        if(parsed.length>0){
          S.albItems=[...S.albItems,...parsed.map(p=>({code:'',name:p.name||'',unit:p.unit||'KG',qty:parseFloat(p.qty)||1,price:parseFloat(p.price)||0}))];
          toast(`🤖 Gemini reconoció ${parsed.length} productos. Revisa y corrige.`,'#16a34a');return;
        }
      }
      toast('Gemini no encontró productos. Prueba con mejor foto o añade manualmente.','#d97706');
    } else {
      // Tesseract fallback
      try{
        if(!window.Tesseract){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
        const worker=await Tesseract.createWorker('spa+eng');
        const {data:{text}}=await worker.recognize(S.albPhoto);
        await worker.terminate();
        const parsed=parseOCRText(text);
        if(parsed.length>0){S.albItems=[...S.albItems,...parsed];toast(`✅ ${parsed.length} líneas reconocidas. Revisa y corrige.`,'#16a34a');}
        else toast('No se reconocieron productos. Añádelos manualmente.','#d97706');
      }catch(te){
        console.warn('Tesseract error:',te);
        toast('OCR básico no disponible aquí. Configura Gemini IA en ⚙️ Config para reconocimiento con IA gratuita.','#d97706');
      }
    }
  }catch(e){console.error(e);toast('Error al analizar la imagen.','#dc2626');}
  finally{if(prog)prog.style.display='none';render();}
}

function parseOCRText(text){
  // Patterns to skip: headers, footers, totals, addresses, legal text
  const SKIP=/base\s*impon|i\.v\.a|importe\s*(total|bruto)|telf[eé]?f?|fax\.?:|www\.|n\.i\.f|c\.i\.f|f\.pedido|f\.entrega|referencia\s*del|preparado|firma|ruta\s*\d|caixe|informaci[oó]n|responsable|alergen|legitimaci|finalidad|mercabarna|import.export|direcci[oó]n|albar[aá]n\s*n|art\.\s*ref|mercancia|n\.\s*cient|kg\.\s*\/?\s*ca|08[0-9]{3}|cliente|c\.i\.f|nif:|10,00\s*%|%\s*de\s*r|sidoro|cami\s*de|palamos|girona\s*\)|barcelona\s*\)|llogitud|francesc|longitud/i;

  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
  const items=[];

  lines.forEach(line=>{
    if(SKIP.test(line)) return;

    // Extract all decimal numbers from line
    const nums=[...line.matchAll(/(\d+[,\.]\d{1,2})/g)].map(m=>parseFloat(m[1].replace(',','.')));
    if(!nums.length) return;

    // Look for article code (3-5 digit number at start of line or after pipe)
    const codeMatch=line.match(/(?:^|\|)\s*(\d{3,5})\b/);
    const code=codeMatch?codeMatch[1]:'';

    // Remove pipe chars, leading code, and scientific names (2+ consecutive ALL_CAPS words ≥4 chars each)
    let name=line
      .replace(/\|/g,' ')
      .replace(/^\s*\d{3,5}\s*/,'')
      .replace(/\b([A-ZÁÉÍÓÚ]{4,})(\s+[A-ZÁÉÍÓÚ]{3,}){1,}\b/g,'')
      .replace(/\d+[,\.]\d+/g,'')
      .replace(/\s+/g,' ')
      .trim();

    // Require meaningful text (at least 3 alpha chars)
    if(name.replace(/[^a-zA-ZáéíóúñÁÉÍÓÚÑ]/g,'').length < 3) return;

    // Determine qty and unit_price using qty*price=total relationship
    let qty=1, price=0, found=false;
    if(nums.length>=3){
      // Try all triplets: a*b≈c or a*c≈b or b*c≈a
      outer: for(let i=0;i<nums.length;i++){
        for(let j=i+1;j<nums.length;j++){
          const prod=nums[i]*nums[j];
          for(let k=0;k<nums.length;k++){
            if(k!==i&&k!==j&&Math.abs(nums[k]-prod)/Math.max(nums[k],0.01)<0.06){
              // nums[i]*nums[j]≈nums[k]: smallest of i,j is qty, other is price
              qty=Math.min(nums[i],nums[j]);
              price=Math.max(nums[i],nums[j]);
              // If qty looks like a price (>50) swap
              if(qty>50&&price<qty){[qty,price]=[price,qty];}
              found=true;
              break outer;
            }
          }
        }
      }
    }
    if(!found){
      if(nums.length>=2){ qty=nums[0]; price=nums[1]; }
      else { price=nums[0]; qty=1; }
    }

    // Sanity: skip totals/taxes (importe bruto etc)
    if(price<=0||price>5000||qty<=0||qty>2000) return;
    // Skip if name contains total-like words
    if(/importe|total|bruto|iva|i\.v\.a/i.test(name)) return;

    // Unit: decimal qty = KG, otherwise check line or default UN
    const unit=qty%1!==0?'KG':/\bkg\b|\bkgs\b|\bkilo/i.test(line)?'KG':'UN';

    items.push({
      code,
      name:name.slice(0,60),
      unit,
      qty:Math.round(qty*100)/100,
      price:Math.round(price*100)/100
    });
  });

  return items.slice(0,50);
}

function saveSup2(id){
  const name=document.getElementById('sf-name-'+id)?.value.trim();
  const emoji=document.getElementById('sf-emoji-'+id)?.value.trim()||'🏭';
  const phone=document.getElementById('sf-phone-'+id)?.value.trim().replace(/\D/g,'');
  if(!name){toast('Introduce el nombre','#dc2626');return;}
  if(id==='new'){const nid='s'+uid();suppliers[nid]={id:nid,name,emoji,phone,products:[]};saveSups();S.editSupId=null;S.openSupId=nid;render();toast('Proveedor creado — ya puedes añadir productos','#16a34a');}
  else{if(!suppliers[id])return;suppliers[id].name=name;suppliers[id].emoji=emoji;suppliers[id].phone=phone;saveSups();render();toast('Proveedor guardado','#16a34a');}
}
function delSup(id){ if(!confirm('¿Eliminar proveedor?'))return;delete suppliers[id];saveSups();render(); }
function toggleSupVisibility(sid,uid,visible){
  if(!suppliers[sid])return;
  if(!suppliers[sid].disabledFor)suppliers[sid].disabledFor=[];
  if(visible){suppliers[sid].disabledFor=suppliers[sid].disabledFor.filter(id=>id!==uid);}
  else{if(!suppliers[sid].disabledFor.includes(uid))suppliers[sid].disabledFor.push(uid);}
  saveSups();
  toast(visible?'Proveedor activado para este local':'Proveedor desactivado para este local','#16a34a');
}
function editProdPrice(sid,pid,val){
  const price=parseFloat(val);
  if(!suppliers[sid]||isNaN(price)||price<0){toast('Precio no válido','#dc2626');return;}
  const prod=suppliers[sid].products.find(p=>p.id===pid);
  if(prod){
    const oldPrice=parseFloat(prod.price)||0;
    prod.price=price;
    saveSups();
    if(fbDb && Math.abs(oldPrice-price)>0.001){
      const h={id:uid(),supId:sid,supName:suppliers[sid].name,prodId:pid,prodName:prod.name,oldPrice,newPrice:price,changedAt:new Date().toISOString()};
      fbDb.ref('priceHistory/'+h.id).set(h);
    }
    const alertPct=cfg.priceAlertPct||5;
    if(oldPrice>0){
      const pct=((price-oldPrice)/oldPrice)*100;
      if(pct>alertPct) toast(`⚠️ ${prod.name}: precio subió un +${pct.toFixed(1)}%`,'#d97706',4000);
      else if(pct<-alertPct) toast(`✅ ${prod.name}: precio bajó un ${pct.toFixed(1)}%`,'#16a34a',4000);
      else toast('Precio actualizado','#16a34a');
    } else { toast('Precio actualizado','#16a34a'); }
  }
}
function addProd(sid){
  const name=document.getElementById('pf-name-'+sid)?.value.trim();
  const unit=document.getElementById('pf-unit-'+sid)?.value;
  const price=parseFloat(document.getElementById('pf-price-'+sid)?.value);
  if(!name||isNaN(price)||price<0){toast('Nombre y precio obligatorios','#dc2626');return;}
  suppliers[sid].products.push({id:'p'+uid(),name,unit:unit||'KG',price});
  saveSups();render();toast('Producto añadido','#16a34a');
}
function delProd(sid,pid){ if(!suppliers[sid])return;suppliers[sid].products=suppliers[sid].products.filter(p=>p.id!==pid);saveSups();render(); }

/* ═══════════════ PLANTILLAS ═══════════════ */
function saveTpl(){
  const name=document.getElementById('tpl-name')?.value.trim();
  if(!name){toast('Pon un nombre','#dc2626');return;}
  const uid2=S.session.userId;
  const sup=suppliers[S.supId];
  const items=sup.products.filter(p=>S.cart[p.id]).map(p=>({prodId:p.id,prodName:p.name,qty:S.cart[p.id],unit:p.unit,price:p.price}));
  if(!items.length){toast('Añade productos primero','#dc2626');return;}
  const tpl={id:uid(),name,supId:S.supId,items,createdAt:new Date().toISOString()};
  if(!templates[uid2])templates[uid2]={};
  templates[uid2][tpl.id]=tpl;
  if(fbDb)fbDb.ref('templates/'+uid2+'/'+tpl.id).set(tpl);
  S.showSaveTemplate=false;
  toast('Plantilla guardada','#16a34a');render();
}
function loadTemplate(tplId){
  const uid2=S.session.userId;
  const tpl=templates[uid2]?.[tplId];if(!tpl)return;
  S.supId=tpl.supId;S.cart={};
  tpl.items.forEach(it=>{S.cart[it.prodId]=it.qty;});
  render();toast('Plantilla cargada — revisa cantidades','#16a34a');
}
function deleteTpl(tplId){
  const uid2=S.session.userId;
  if(!confirm('¿Eliminar plantilla?'))return;
  if(templates[uid2])delete templates[uid2][tplId];
  if(fbDb)fbDb.ref('templates/'+uid2+'/'+tplId).remove();
  render();
}
function loadAutoSuggest(){
  if(!S.session) return;
  const myHistory=orders.filter(o=>o.restaurant===S.session.restaurant&&o.supId===S.supId&&o.status!=='rejected');
  const acc={};
  myHistory.forEach(o=>o.items.forEach(it=>{if(!acc[it.id])acc[it.id]={prodId:it.id,totalQty:0,count:0};acc[it.id].count++;acc[it.id].totalQty+=it.qty;}));
  S.cart={};
  Object.values(acc).sort((a,b)=>b.count-a.count).slice(0,5).forEach(it=>{
    S.cart[it.prodId]=Math.round(it.totalQty/it.count)||1;
  });
  render();toast('🤖 Pedido típico cargado — ajusta cantidades','#7c3aed');
}

/* ═══════════════ COMPARATIVA PROVEEDORES ═══════════════ */
function vCompare(){
  const sups=supList();
  if(sups.length<2)return`<div class="empty"><div class="ei">🔍</div><div class="et">Necesitas al menos 2 proveedores para comparar</div></div>`;
  const groups={};
  sups.forEach(sup=>{
    (sup.products||[]).forEach(p=>{
      const key=p.name.toLowerCase().trim();
      if(!groups[key])groups[key]={name:p.name,entries:{}};
      groups[key].entries[sup.id]={price:parseFloat(p.price)||0,unit:p.unit};
    });
  });
  const multi=Object.values(groups).filter(g=>Object.keys(g.entries).length>=2).sort((a,b)=>a.name.localeCompare(b.name,'es'));
  if(!multi.length)return`<div class="empty"><div class="ei">🔍</div><div class="et">No hay productos con el mismo nombre en varios proveedores</div></div>`;
  const headers=sups.map(s=>`<th style="text-align:right;padding:4px 8px 10px;font-size:11px;color:var(--mut);white-space:nowrap">${s.emoji} ${s.name}</th>`).join('');
  const rows=multi.map(g=>{
    const prices=Object.values(g.entries).map(e=>e.price).filter(p=>p>0);
    const minP=prices.length?Math.min(...prices):0;
    const cells=sups.map(sup=>{
      const e=g.entries[sup.id];
      if(!e)return`<td style="padding:6px 8px;text-align:right;color:var(--brd)">—</td>`;
      const cheap=e.price>0&&e.price===minP&&prices.filter(p=>p===minP).length<prices.length;
      return`<td style="padding:6px 8px;text-align:right;font-size:13px;${cheap?'color:#16a34a;font-weight:700':''}">${cheap?'✅ ':''}${fmt(e.price)}<span style="font-size:10px;color:var(--mut)">/${e.unit}</span></td>`;
    }).join('');
    return`<tr style="border-top:1px solid var(--brd)"><td style="padding:6px 4px 6px 0;font-size:13px">${g.name}</td>${cells}</tr>`;
  }).join('');
  return`<div class="card"><div class="card-t">Comparativa de precios entre proveedores</div>
    <div style="font-size:12px;color:var(--mut);margin-bottom:12px">✅ = precio más bajo. Solo aparecen productos presentes en 2+ proveedores.</div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="text-align:left;padding:4px 0 10px;font-size:11px;color:var(--mut)">Producto</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

/* ═══════════════ FOOD COST ═══════════════ */
function fcKey(){
  const d=new Date(S.fcDate+'T12:00:00');
  if(S.fcPeriod==='day') return 'd_'+S.fcDate;
  if(S.fcPeriod==='week'){
    const m=new Date(d); m.setDate(d.getDate()-((d.getDay()+6)%7));
    return 'w_'+m.toISOString().split('T')[0];
  }
  return 'm_'+S.fcDate.slice(0,7);
}
function fcRange(){
  const d=new Date(S.fcDate+'T12:00:00');
  if(S.fcPeriod==='day'){ return {s:new Date(S.fcDate+'T00:00:00'),e:new Date(S.fcDate+'T23:59:59')}; }
  if(S.fcPeriod==='week'){
    const s=new Date(d); s.setDate(d.getDate()-((d.getDay()+6)%7)); s.setHours(0,0,0,0);
    const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999);
    return {s,e};
  }
  return {s:new Date(d.getFullYear(),d.getMonth(),1),e:new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999)};
}
function fcPeriodLabel(){
  const d=new Date(S.fcDate+'T12:00:00');
  if(S.fcPeriod==='day') return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  if(S.fcPeriod==='week'){ const {s,e}=fcRange(); return s.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' – '+e.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}); }
  return d.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
}
function fcNavDate(dir){
  const d=new Date(S.fcDate+'T12:00:00');
  if(S.fcPeriod==='day') d.setDate(d.getDate()+dir);
  else if(S.fcPeriod==='week') d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  S.fcDate=d.toISOString().split('T')[0]; render();
}
function fcOrders(){
  const {s,e}=fcRange();
  return orders.filter(o=>o.status==='approved'&&new Date(o.createdAt)>=s&&new Date(o.createdAt)<=e);
}
function saveRevenue(key,val){
  const v=parseFloat(val);
  if(isNaN(v)||v<0){toast('Valor no válido','#dc2626');return;}
  revenue[key]=v;
  if(fbDb) fbDb.ref('revenue/'+key).set(v);
  render();
}
function fcBadge(pct){
  if(pct===null||pct===undefined) return `<span style="color:var(--mut);font-size:12px">—</span>`;
  const col=pct<28?'#16a34a':pct<33?'#ca8a04':pct<38?'#ea580c':'#dc2626';
  const lbl=pct<28?'Excelente':pct<33?'Bueno':pct<38?'Atención':'Elevado';
  const ico=pct<28?'✅':pct<33?'👍':pct<38?'⚠️':'🔴';

function vFoodCost(){
  const key=fcKey();
  const rev=revenue[key]||0;
  const appr=fcOrders();
  const totalCost=appr.reduce((s,o)=>s+total(o),0);
  const pct=(rev>0)?((totalCost/rev)*100):null;
  const pctCol=pct===null?'var(--mut)':pct<28?'#16a34a':pct<33?'#ca8a04':pct<38?'#ea580c':'#dc2626';
  const pctLbl=pct===null?'Sin facturación':pct<28?'Excelente':pct<33?'Bueno':pct<38?'Atención':'Elevado';
  const pctIco=pct===null?'':pct<28?'✅':pct<33?'👍':pct<38?'⚠️':'🔴';

  const byRest={};
  cfg.users.forEach(u=>{byRest[u.id]={name:u.restaurant,id:u.id,cost:0};});
  appr.forEach(o=>{const u=cfg.users.find(x=>x.restaurant===o.restaurant);if(u&&byRest[u.id])byRest[u.id].cost+=total(o);});
  const restRows=Object.values(byRest).filter(r=>r.cost>0).sort((a,b)=>b.cost-a.cost).map(r=>{
    const rKey=key+'_r_'+r.id;
    const rRev=revenue[rKey]||0;
    const rPct=(rRev>0)?((r.cost/rRev)*100):null;
    const rCol=rPct===null?'var(--mut)':rPct<28?'#16a34a':rPct<33?'#ca8a04':rPct<38?'#ea580c':'#dc2626';
    return `<tr style="border-top:1px solid var(--brd)">
      <td style="padding:8px 4px 8px 0;font-size:13px">${r.name}</td>
      <td style="padding:8px 4px;text-align:right;font-weight:600;font-size:13px;white-space:nowrap">${fmt(r.cost)}</td>
      <td style="padding:8px 4px"><div style="display:flex;align-items:center;gap:4px">
        <input type="number" value="${rRev||''}" placeholder="—" step="0.01" min="0"
          style="width:90px;padding:4px 6px;border:1px solid var(--brd);border-radius:6px;font-size:13px;text-align:right"
          onchange="saveRevenue('${rKey}',this.value)"/>
        <span style="font-size:11px;color:var(--mut)">€</span>
      </div></td>
      <td style="padding:8px 0;text-align:center"><span style="color:${rCol};font-weight:700;font-size:13px">${rPct!==null?rPct.toFixed(1)+'%':'—'}</span></td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-bottom:12px">
    <div style="display:flex;gap:6px;margin-bottom:16px">
      ${['day','week','month'].map(p=>`<button class="btn ${S.fcPeriod===p?'btn-pri':'btn-ghost'} btn-sm" onclick="S.fcPeriod='${p}';render()">${p==='day'?'Día':p==='week'?'Semana':'Mes'}</button>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">

/* ═══════════════ PUSH NOTIFICATIONS ═══════════════ */
function requestPushPermission(){
  if(!('Notification' in window)){toast('Tu navegador no soporta notificaciones','#dc2626');return;}
  Notification.requestPermission().then(perm=>{
    const el=document.getElementById('push-status');
    if(perm==='granted'){
      if(el)el.textContent='✅ Notificaciones activas';
      toast('🔔 Notificaciones activadas','#16a34a');
    } else {
      if(el)el.textContent='❌ Bloqueadas — actívalas en la configuración del navegador';
      toast('❌ Notificaciones bloqueadas','#dc2626');
    }
  });
}
function pushNotify(title,body,icon='🛒'){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  try{ new Notification(`${icon} ${title}`,{body,icon:'https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6d2.svg',badge:'https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6d2.svg'}); }catch(e){}
}

/* ═══════════════ ORDER ACTIONS ═══════════════ */
function setSup(id){ S.supId=id;S.cart={};S.prodSearch='';render(); }
function chgQ(id,d){
  const q=S.cart[id]||0,nq=Math.max(0,q+d);
  if(nq===0)delete S.cart[id];else S.cart[id]=nq;
  const el=document.getElementById('qd-'+id);if(el)el.textContent=nq;
  const pi=document.getElementById('pi-'+id);if(pi)pi.className='pi'+(nq>0?' ic':'');
  const sup=suppliers[S.supId];
  const cnt=Object.values(S.cart).reduce((s,v)=>s+v,0);
  const tot=(sup?sup.products:[]).reduce((s,p)=>s+(S.cart[p.id]||0)*p.price,0);
  const bar=document.getElementById('cbar');if(bar)bar.className='cbar'+(cnt>0?' up':'');
  const cv=document.getElementById('cb-v');if(cv)cv.textContent=`${cnt} artículos`;
  const cs=document.getElementById('cb-s');if(cs)cs.textContent=fmt(tot);
}

function submitOrder(){
  if(!S.session){toast('Sin sesión','#dc2626');return;}
  const sup=suppliers[S.supId];
  if(!sup||!Object.keys(S.cart).length){toast('Añade productos al pedido','#dc2626');return;}
  const items=sup.products.filter(p=>S.cart[p.id]).map(p=>({...p,qty:S.cart[p.id]}));
  const needApproval=S.session.needsApproval;
  const o={id:uid(),restaurant:S.session.restaurant,supId:S.supId,items,status:needApproval?'pending':'approved',autoApproved:!needApproval,createdAt:new Date().toISOString(),urgent:S.orderUrgent||false,deliveryDate:S.orderDeliveryDate||null};
  saveOrder(o);
  S.cart={};S.orderUrgent=false;S.orderDeliveryDate='';S.prodSearch='';
  if(needApproval){
    showWA(cfg.adminPhone||'',msgAdmin(o),`Pedido de ${o.restaurant} — envíalo a ${cfg.adminName} para que lo apruebe`);
    toast('✅ Pedido enviado — notifica al jefe por WhatsApp','#d97706');
  } else {
    showWA(sup.phone||'',msgSupplier(o),`Pedido aprobado — envíalo a ${sup.name}`);
    toast('⚡ Pedido aprobado — envía al proveedor','#16a34a');
  }
  render();
}

function approve(id){
  updateOrder(id,{status:'approved'});
  if(!fbDb){ const o=orders.find(o=>o.id===id);if(o)o.status='approved'; render(); }
  toast('✅ Pedido aprobado','#16a34a');
}
function rejectWithReason(id){
  const reason=prompt('Motivo del rechazo (opcional):');
  if(reason===null) return; // cancelled
  updateOrder(id,{status:'rejected',rejectReason:reason||''});
  if(!fbDb){ const o=orders.find(o=>o.id===id);if(o){o.status='rejected';o.rejectReason=reason||'';} render(); }
  toast('Pedido rechazado','#dc2626');
}
function startEditOrder(id){
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  S.editOrderId=id;
  S.editItems=o.items.map(it=>({...it}));
  renderAdminContent();
}
function editItemQty(idx,delta){
  S.editItems[idx].qty=Math.max(0,(S.editItems[idx].qty||0)+delta);
  const el=document.getElementById('eiq-'+idx);
  if(el) el.textContent=S.editItems[idx].qty;
  const ep=document.getElementById('eip-'+idx);
  if(ep) ep.textContent=fmt(S.editItems[idx].qty*S.editItems[idx].price);
  const newTot=S.editItems.reduce((s,it)=>s+it.qty*it.price,0);
  const te=document.getElementById('edit-tot');
  if(te) te.textContent='Total: '+fmt(newTot);
}
function approveWithEdits(id){
  const items=S.editItems.filter(it=>it.qty>0);
  if(!items.length){toast('El pedido no puede estar vacío','#dc2626');return;}
  updateOrder(id,{status:'approved',items,modifiedByAdmin:true});
  if(!fbDb){ const o=orders.find(x=>x.id===id);if(o){o.status='approved';o.items=items;o.modifiedByAdmin=true;} }
  S.editOrderId=null;S.editItems=[];
  toast('✅ Pedido modificado y aprobado','#16a34a');
}

function markReceived(id){
  updateOrder(id,{status:'received',receivedAt:new Date().toISOString()});
  if(!fbDb){ const o=orders.find(x=>x.id===id);if(o){o.status='received';o.receivedAt=new Date().toISOString();} render(); }

let _monthlyChart=null;
function renderMonthlyChart(){
  const canvas=document.getElementById('monthly-chart');
  if(!canvas) return;
  if(_monthlyChart){_monthlyChart.destroy();_monthlyChart=null;}
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(d.toISOString().slice(0,7));
  }
  const rests=[...new Set(orders.map(o=>o.restaurant))].sort();
  const colors=['#e94560','#1a1a2e','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#059669','#dc2626','#2563eb','#9333ea','#ea580c'];
  const datasets=rests.map((r,i)=>({
    label:r.replace("O'Carro ",''),
    data:months.map(m=>orders.filter(o=>o.status!=='rejected'&&o.restaurant===r&&o.createdAt.startsWith(m)).reduce((s,o)=>s+total(o),0)),
    backgroundColor:colors[i%colors.length]+'99',
    borderColor:colors[i%colors.length],
    borderWidth:1.5,
    borderRadius:4,
  }));
  const labels=months.map(m=>{const[y,mo]=m.split('-');return new Date(y,mo-1).toLocaleDateString('es',{month:'short',year:'2-digit'});});
  _monthlyChart=new Chart(canvas,{type:'bar',data:{labels,datasets},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:false},y:{ticks:{callback:v=>'€'+v.toLocaleString('es')}}}}});
}

function exportExcel(type){
  if(typeof XLSX==='undefined'){toast('Librería Excel no cargada','#dc2626');return;}
  let rows=[];
  let filename='pedidos';
  if(type==='all'||type==='monthly'||!type){
    filename='pedidos_ocarro_'+new Date().toISOString().slice(0,10);
    rows=[['ID','Fecha','Local','Proveedor','Estado','Total €','Urgente','Entrega'],...orders.map(o=>[o.id,o.createdAt.slice(0,10),o.restaurant,(suppliers[o.supId]||{name:o.supId}).name,o.status,total(o).toFixed(2),o.urgent?'Sí':'No',o.deliveryDate||''])];
  } else if(type==='received'){
    filename='pedidos_recibidos_'+new Date().toISOString().slice(0,10);
    const rec=orders.filter(o=>o.status==='received');
    rows=[['ID','Fecha pedido','Fecha recepción','Local','Proveedor','Total €'],...rec.map(o=>[o.id,o.createdAt.slice(0,10),(o.receivedAt||'').slice(0,10),o.restaurant,(suppliers[o.supId]||{name:o.supId}).name,total(o).toFixed(2)])];
  }
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Pedidos');
  XLSX.writeFile(wb,filename+'.xlsx');
  toast('📥 Excel descargado','#16a34a');
}

  S.darkMode=!S.darkMode;
  localStorage.setItem('oc_dark',S.darkMode?'1':'0');

}

function initEscandallos(){
  _escSupsCache = suppliers;
  escRender();
  if(_escInit||!fbDb) return;
  _escInit=true;
  fbDb.ref('escandallos').on('value', snap=>{
    _escAllData = snap.val() || {};
    escRender();
  });
}

function escRender(){
  const grid = document.getElementById('esc-grid');
  if(!grid) return;
  const txt = (document.getElementById('esc-search')?.value||'').toLowerCase();
  const cat = document.getElementById('esc-cat-filter')?.value||'';
  const entries = Object.entries(_escAllData).filter(([,e])=>{
    return (!txt||e.nombre?.toLowerCase().includes(txt))&&(!cat||e.categoria===cat);
  });
  if(!entries.length){
    grid.innerHTML='<p style="color:var(--mut)">No hay escandallos. Crea el primero con "+ Nuevo".</p>';
    return;
  }
  grid.innerHTML = entries.map(([id,e])=>{
    const coste = (e.ingredientes||[]).reduce((s,i)=>s+(parseFloat(i.cantidad)||0)*(parseFloat(i.precioUnitario)||0),0);
    const pvp = parseFloat(e.precioVenta)||0;
    const fcObj = parseFloat(e.foodCostObjetivo)||30;
    const fcReal = pvp>0?(coste/pvp*100):null;
    const margen = pvp>0?(pvp-coste):null;
    const margenPct = pvp>0&&margen!==null?(margen/pvp*100):null;
    let cls='esc-ok';
    if(fcReal!==null){if(fcReal>fcObj+5)cls='esc-bad';else if(fcReal>fcObj)cls='esc-warn';}
    return `<div class="esc-card" onclick="escOpenModal('${id}')">
      <div class="esc-fc-ind ${cls}">${fcReal!==null?fcReal.toFixed(0)+'%':'—'}</div>
      <span class="esc-badge">${e.categoria||'Otros'}</span>
      <h4>${e.nombre||'Sin nombre'}</h4>
      <div class="esc-stats">
        <div class="esc-stat"><span>Coste</span><strong>${escFmt(coste)}</strong></div>
        <div class="esc-stat"><span>PVP</span><strong>${pvp>0?escFmt(pvp):'—'}</strong></div>
        <div class="esc-stat"><span>Margen</span><strong>${margen!==null?escFmt(margen):'—'}</strong></div>
        <div class="esc-stat"><span>% Margen</span><strong>${margenPct!==null?margenPct.toFixed(1)+'%':'—'}</strong></div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--mut)">${(e.ingredientes||[]).length} ingredientes</div>
    </div>`;
  }).join('');
}

function escOpenModal(id=null){
  _escEditId=id; _escIngs=[];
  _escSupsCache=suppliers;
  document.getElementById('esc-modal-title').textContent=id?'Editar escandallo':'Nuevo escandallo';
  document.getElementById('esc-btn-del').style.display=id?'':'none';
  if(id&&_escAllData[id]){
    const e=_escAllData[id];
    document.getElementById('esc-nombre').value=e.nombre||'';
    document.getElementById('esc-categoria').value=e.categoria||'Carnes';
    document.getElementById('esc-pvp').value=e.precioVenta||'';
    document.getElementById('esc-fcobj').value=e.foodCostObjetivo||30;
    document.getElementById('esc-notas').value=e.notas||'';
    _escIngs=JSON.parse(JSON.stringify(e.ingredientes||[]));
  } else {
    document.getElementById('esc-nombre').value='';
    document.getElementById('esc-categoria').value='Carnes';
    document.getElementById('esc-pvp').value='';
    document.getElementById('esc-fcobj').value=30;
    document.getElementById('esc-notas').value='';
  }
  // Poblar proveedores
  const sel=document.getElementById('esc-sel-prov');
  sel.innerHTML='<option value="">-- Proveedor --</option>';
  Object.entries(_escSupsCache).forEach(([pid,prov])=>{
    const o=document.createElement('option');
    o.value=pid; o.textContent=(prov.emoji||'')+(prov.name||pid);
    sel.appendChild(o);
  });
  escRenderIngs(); escRecalc();
  document.getElementById('esc-modal-ov').style.display='flex';
}
function escCloseModal(){ document.getElementById('esc-modal-ov').style.display='none'; _escEditId=null; _escIngs=[]; }

function escLoadProds(){
  const pid=document.getElementById('esc-sel-prov').value;
  const sel=document.getElementById('esc-sel-prod');
  sel.innerHTML='<option value="">-- Producto --</option>';
  if(!pid||!_escSupsCache[pid]) return;
  const prods=_escSupsCache[pid].products||[];
  (Array.isArray(prods)?prods:Object.values(prods)).forEach(p=>{
    const o=document.createElement('option');
    o.value=p.id||p.name;
    o.textContent=`${p.name} (${parseFloat(p.price||0).toFixed(2)}€/${p.unit||'u.'})`;
    o.dataset.price=p.price||0; o.dataset.unit=p.unit||'u.'; o.dataset.name=p.name||'';
    sel.appendChild(o);
  });
}

function escAddIng(){
  const pid=document.getElementById('esc-sel-prov').value;
  const sel=document.getElementById('esc-sel-prod');
  const prodId=sel.value;
  const qty=parseFloat(document.getElementById('esc-sel-qty').value);
  if(!pid){toast('Selecciona un proveedor','#dc2626');return;}
  if(!prodId){toast('Selecciona un producto','#dc2626');return;}
  if(!qty||qty<=0){toast('Introduce una cantidad válida','#dc2626');return;}
  const opt=sel.options[sel.selectedIndex];
  const prov=_escSupsCache[pid];
  _escIngs.push({proveedorId:pid,proveedorNombre:(prov?.name||pid),productoId:prodId,nombre:opt.dataset.name||opt.textContent,cantidad:qty,unidad:opt.dataset.unit||'u.',precioUnitario:parseFloat(opt.dataset.price)||0});
  document.getElementById('esc-sel-prov').value='';
  document.getElementById('esc-sel-prod').innerHTML='<option value="">-- Producto --</option>';
  document.getElementById('esc-sel-qty').value='';
  escRenderIngs(); escRecalc();
}

function escQuitarIng(i){ _escIngs.splice(i,1); escRenderIngs(); escRecalc(); }

function escLivePrice(ing){
  // Use live price from suppliers if product still exists there
  const sup=suppliers[ing.proveedorId];
  if(sup&&sup.products){
    const prod=sup.products.find(p=>p.id===ing.productoId);
    if(prod) return parseFloat(prod.price)||0;
  }
  return parseFloat(ing.precioUnitario)||0;
}
function escRenderIngs(){
  const cont=document.getElementById('esc-ing-list');
  if(!cont) return;
  if(!_escIngs.length){cont.innerHTML='<p style="color:var(--mut);font-size:13px">Sin ingredientes</p>';return;}
  cont.innerHTML=_escIngs.map((ing,i)=>{
    const liveP=escLivePrice(ing);
    const changed=Math.abs(liveP-(parseFloat(ing.precioUnitario)||0))>0.001;
    const priceTag=changed?`<span style="color:#d97706;font-size:10px" title="Precio actualizado desde tarifa">🔄 ${escFmt(liveP)}</span>`:`${escFmt(liveP)}`;
    return `<div class="esc-ing-row">
      <span class="in">${ing.nombre}</span>
      <span class="id">${ing.cantidad} ${ing.unidad} × ${priceTag}</span>
      <span class="ic">${escFmt(ing.cantidad*liveP)}</span>
      <button onclick="escQuitarIng(${i})" title="Eliminar">✕</button>
    </div>`;
  }).join('');
}

function escRecalc(){
  const coste=_escIngs.reduce((s,i)=>s+(parseFloat(i.cantidad)||0)*escLivePrice(i),0);
  const pvp=parseFloat(document.getElementById('esc-pvp')?.value)||0;
  const fcObj=parseFloat(document.getElementById('esc-fcobj')?.value)||30;
  const fcReal=pvp>0?(coste/pvp*100):null;
  const pvpSug=coste>0?(coste/(fcObj/100)):null;
  const margen=pvp>0?(pvp-coste):null;
  const margenPct=pvp>0&&margen!==null?(margen/pvp*100):null;
  document.getElementById('ec-coste').textContent=escFmt(coste);
  const fcEl=document.getElementById('ec-fc');
  if(fcReal!==null){fcEl.textContent=fcReal.toFixed(1)+'%';fcEl.className=fcReal<=fcObj?'fc-ok':fcReal<=fcObj+5?'fc-warn':'fc-bad';}
  else{fcEl.textContent='— %';fcEl.className='';}
  document.getElementById('ec-pvpsug').textContent=pvpSug!==null?escFmt(pvpSug):'— €';
  document.getElementById('ec-margen').textContent=margen!==null?escFmt(margen):'— €';
  document.getElementById('ec-margenpct').textContent=margenPct!==null?margenPct.toFixed(1)+'%':'— %';
}

function escSave(){
  if(!fbDb){toast('Sin conexión Firebase — espera un momento y vuelve a intentarlo','#dc2626');return;}
  const nombreEl=document.getElementById('esc-nombre');
  if(!nombreEl){toast('Error: recarga la página','#dc2626');return;}
  const nombre=nombreEl.value.trim();
  if(!nombre){toast('Escribe el nombre del plato','#dc2626');return;}
  try{
    const ingsWithLivePrice=_escIngs.map(ing=>({...ing,precioUnitario:escLivePrice(ing)}));
    const data={
      nombre,
      categoria:document.getElementById('esc-categoria')?.value||'Otros',
      precioVenta:parseFloat(document.getElementById('esc-pvp')?.value)||0,
      foodCostObjetivo:parseFloat(document.getElementById('esc-fcobj')?.value)||30,
      notas:document.getElementById('esc-notas')?.value.trim()||'',
      ingredientes:ingsWithLivePrice,
      updatedAt:Date.now()
    };
    const ref=_escEditId?fbDb.ref('escandallos/'+_escEditId):fbDb.ref('escandallos').push();
    if(!_escEditId) data.createdAt=Date.now();
    ref.set(data)
      .then(()=>{escCloseModal();toast('✅ Escandallo guardado','#16a34a');})
      .catch(e=>toast('Error al guardar: '+e.message,'#dc2626'));
  }catch(e){toast('Error: '+e.message,'#dc2626');console.error(e);}
}

function escDelete(){
  if(!_escEditId||!confirm('¿Eliminar este escandallo?')) return;
  fbDb.ref('escandallos/'+_escEditId).remove().then(()=>{escCloseModal();toast('Escandallo eliminado','#888');});
}

function escFmt(v){ return parseFloat(v||0).toFixed(2).replace('.',',')+' €'; }

function addMissingSuppliers(){
  if(!fbDb) return;
  fbDb.ref('suppliers').once('value', snap=>{
    const existing = snap.val() || {};
    const updates = {};
    Object.entries(NEW_SUPPLIERS).forEach(([id, sup])=>{
      if(!existing[id]) updates[id] = sup;
    });
    if(Object.keys(updates).length > 0){
      fbDb.ref('suppliers').update(updates).then(()=>{
        toast('✅ Nuevos proveedores añadidos: '+Object.keys(updates).map(k=>NEW_SUPPLIERS[k].name).join(', '),'#16a34a');
      });
    }
  });
}

function updateCoreSuppliers(){
  if(!fbDb) return;
  fbDb.ref('suppliers').once('value', snap=>{
    const existing = snap.val() || {};
    const updates = {};
    ['bencar','ismael'].forEach(id=>{
      const cur = existing[id];
      const def = DEFAULT_SUPS[id];
      if(!cur || !cur.products || !cur.products[0] || !String(cur.products[0].id).startsWith(id==='bencar'?'bx':'ix')){
        updates[id] = def;
      }
    });
    if(Object.keys(updates).length > 0){
      fbDb.ref('suppliers').update(updates).then(()=>{
        toast('✅ Tarifas de Bencar e Ismael actualizadas','#16a34a');
      });
    }
  });
}

window.addEventListener('DOMContentLoaded',()=>{
  try {
    fbApp = firebase.initializeApp({ databaseURL: FB_URL });
    fbDb  = firebase.database();
  } catch(e) {
    console.warn('Firebase init error:', e);
  }
  if(S.darkMode) document.body.classList.add('dark');
  // PWA manifest injection
  const manifest={name:"O'Carro Pedidos",short_name:"O'Carro",start_url:window.location.href,display:"standalone",background_color:"#f0f2f5",theme_color:"#1a1a2e",icons:[{src:"https://raw.githubusercontent.com/twitter/twemoji/master/assets/svg/1f6d2.svg",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const mUrl=URL.createObjectURL(mBlob);
  document.getElementById('pwa-manifest').href=mUrl;
  if('serviceWorker' in navigator){
    const sw=`self.addEventListener('fetch',e=>{});`;
    const swBlob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{type:'classic'}).catch(()=>{});
  }
  initFirebaseListeners();
  addMissingSuppliers();
  updateCoreSuppliers();
  render();
});
